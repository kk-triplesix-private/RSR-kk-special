name: Sync Upstream

on:
  schedule:
    - cron: '0 */2 * * *'  # Every 2 hours
  workflow_dispatch:        # Manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/FFXIV-CombatReborn/RotationSolverReborn.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Check for upstream changes
        id: check
        run: |
          CHANGES=$(git diff HEAD upstream/main -- . ':!.github/workflows/' --stat)
          if [ -z "$CHANGES" ]; then
            echo "No upstream changes to sync"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "Upstream has changes:"
            echo "$CHANGES"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Squash-merge upstream (exclude workflows, keep our changes on conflict)
        if: steps.check.outputs.has_changes == 'true'
        id: merge
        run: |
          # Configure 'ours' merge driver for .gitattributes-protected files
          git config merge.ours.driver true

          # Squash-merge so upstream commits (which may touch workflow files) are
          # not pushed into our history — GITHUB_TOKEN cannot push workflow changes
          # `-X ours` does not handle modify/delete conflicts; resolve those manually below.
          set +e
          git merge --squash --strategy-option ours upstream/main
          merge_rc=$?
          set -e

          # Resolve modify/delete conflicts: keep our side (file kept if we modified, deleted if we deleted)
          # `git status --porcelain` codes: DU = deleted by them, modified by us; UD = modified by them, deleted by us
          # Use -z for NUL-terminated output so paths with spaces are not quoted
          while IFS= read -r -d '' entry; do
            [ -z "$entry" ] && continue
            code="${entry:0:2}"
            path="${entry:3}"
            case "$code" in
              "DU") git add -- "$path" ;;          # upstream deleted, we modified → keep ours
              "UD") git rm -f -- "$path" ;;        # upstream modified, we deleted → keep deletion
            esac
          done < <(git status --porcelain -z)

          # Bail if any real (content) conflicts remain (UU/AA/etc.)
          if git status --porcelain | grep -qE '^(UU|AA|DD|AU|UA) '; then
            git reset --merge
            echo "status=conflict" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # If merge failed for reasons other than modify/delete conflicts we just resolved, abort
          if [ $merge_rc -ne 0 ] && git status --porcelain | grep -qE '^U'; then
            git reset --merge
            echo "status=conflict" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Remove any upstream workflow changes from staging — we keep our own
          git reset -- .github/workflows/ 2>/dev/null || true
          git checkout HEAD -- .github/workflows/ 2>/dev/null || true
          git clean -fd -- .github/workflows/ 2>/dev/null || true

          # Protect files with known upstream issues — keep our fixed versions
          git reset -- RotationSolver/ExtraRotations/Magical/BeirutaRDM.cs 2>/dev/null || true
          git checkout HEAD -- RotationSolver/ExtraRotations/Magical/BeirutaRDM.cs 2>/dev/null || true

          if ! git diff --staged --quiet; then
            git commit -m "Sync upstream changes"
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "No effective changes after excluding workflows"
            echo "status=noop" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine next version tag
        if: steps.merge.outputs.status == 'success'
        id: version
        run: |
          # Get latest tag matching x.x.x.x pattern (no v prefix)
          LATEST=$(git tag --list '[0-9]*.*.*.*' --sort=-version:refname | head -1)
          if [ -z "$LATEST" ]; then
            NEXT="7.4.5.1"
          else
            # Increment last digit
            BASE=$(echo "$LATEST" | sed 's/\.[0-9]*$//')
            PATCH=$(echo "$LATEST" | sed 's/.*\.//')
            NEXT="${BASE}.$((PATCH + 1))"
          fi
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEXT"

      - name: Push and tag
        if: steps.merge.outputs.status == 'success'
        run: |
          git push origin main
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Warn on conflict
        if: steps.merge.outputs.status == 'conflict'
        run: |
          echo "::warning::Upstream merge had unresolvable conflicts. Manual intervention needed."
          exit 1
